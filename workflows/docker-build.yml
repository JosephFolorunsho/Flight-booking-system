name: Docker Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker-compose-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build all services
        run: docker-compose build
      
      - name: Verify images created
        run: |
          docker images | grep skyroute || echo "Images built successfully"
          echo " Docker Compose build successful!"

  docker-compose-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=skyroute
          POSTGRES_PASSWORD=skyroute_password
          POSTGRES_DB=skyroute_db
          DATABASE_URL=postgresql://skyroute:skyroute_password@db:5432/skyroute_db
          NODE_ENV=production
          PORT=3000
          VITE_API_URL=http://localhost:3000
          EOF
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for database to be ready..."
          sleep 10
          
          echo "Waiting for backend to be ready..."
          timeout 90 bash -c 'until curl -f http://localhost:3000/health 2>/dev/null; do echo "Waiting..."; sleep 3; done' || {
            echo "Backend failed to start. Checking logs..."
            docker-compose logs backend
            exit 1
          }
      
      - name: Test backend health endpoint
        run: |
          response=$(curl -s http://localhost:3000/health)
          echo "Health check response: $response"
          
          if echo "$response" | grep -q "healthy"; then
            echo " Backend health check passed"
          else
            echo " Backend health check failed"
            docker-compose logs backend
            exit 1
          fi
      
      - name: Test database connection
        run: |
          docker-compose exec -T db psql -U skyroute -d skyroute_db -c "SELECT COUNT(*) FROM airports;" || {
            echo " Database query failed"
            docker-compose logs db
            exit 1
          }
          echo " Database connection successful"
      
      - name: Test frontend accessibility
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173)
          if [ "$status" -eq 200 ]; then
            echo " Frontend is accessible (HTTP $status)"
          else
            echo " Frontend returned HTTP $status (may be normal for Vite dev server)"
          fi
      
      - name: Show container status
        run: docker-compose ps
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker-compose logs backend
          echo ""
          echo "=== Frontend Logs ==="
          docker-compose logs frontend
          echo ""
          echo "=== Database Logs ==="
          docker-compose logs db
      
      - name: Stop services
        if: always()
        run: docker-compose down -v

  build-backend-image:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: skyroute-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify build
        run: echo "✅ Backend Docker image built successfully!"

  build-frontend-image:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: skyroute-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify build
        run: echo "✅ Frontend Docker image built successfully!"