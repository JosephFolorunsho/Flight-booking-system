version: '3.8'

services:
  # ============================================
  # PostgreSQL 15 Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: skyroute-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skyroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skyroute_secret}
      POSTGRES_DB: ${POSTGRES_DB:-skyroute_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds
      - ./database/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skyroute} -d ${POSTGRES_DB:-skyroute_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skyroute-network

  # ============================================
  # pgAdmin - Database UI
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skyroute-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - skyroute-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ============================================
  # Node.js / Express Backend API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyroute-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      POSTGRES_USER: ${POSTGRES_USER:-skyroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skyroute_secret}
      POSTGRES_DB: ${POSTGRES_DB:-skyroute_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      FRONTEND_URL: http://localhost:3001
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - skyroute-network

  # ============================================
  # React / Vite Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skyroute-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://98.87.163.51:3000
      PORT: 80
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - skyroute-network

volumes:
  pgdata:
    driver: local
  pgadmin_data:
    driver: local

networks:
  skyroute-network:
    driver: bridge
